<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Pontos de Poda</title>

  <!-- Leaflet + MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

  <style>
    html, body { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      font-family: Arial, sans-serif; 
    }

    #map { 
      height: 100%; 
      width: 100%; 
    }

    /* ===== GUIAS TOPO ===== */
    .top-tabs {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1500;
      background: rgba(255,255,255,0.95);
      padding: 6px 14px;
      border-radius: 30px;
      box-shadow: 0 3px 8px rgba(0,0,0,.15);
      display: flex;
      gap: 10px;
    }

    .top-tabs .tab {
      border: none;
      background: transparent;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s ease;
      color: #444;
    }

    .top-tabs .tab:hover {
      background: rgba(0,0,0,0.05);
    }

    .top-tabs .active {
      background: #007bff;
      color: #fff;
    }

    .loc-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      background: #007bff;
      color: #fff;
      padding: 14px 18px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
    }

    /* ===== MODAL ===== */
    #modalExecucao {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 2000;
      backdrop-filter: blur(5px);
    }

    #modalExecucao .box {
      background: #fff;
      width: 320px;
      margin: 100px auto;
      padding: 20px;
      border-radius: 12px;
    }

    #modalExecucao input,
    #modalExecucao textarea {
      width: 100%;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- GUIAS -->
<div class="top-tabs">
  <a href="../index.html" class="tab">Podas</a>
  <a href="" class="tab active">NDS</a>
</div>

<div id="map"></div>

<div class="loc-btn" onclick="goToLocation()">📍 Localizar</div>

<!-- ===== MODAL EXECUÇÃO ===== -->
<div id="modalExecucao">
  <div class="box">
    <h3>Executar ponto</h3>

    <label for="inputEquipe">Equipe *</label><br>
    <select id="inputEquipe" style="box-shadow: none; border: 1px solid black; background-color: white;">
      <option value="CSRPAR0601">CSRPAR0601</option>
      <option value="CSRSJM0602">CSRSJM0602</option>
      <option value="CSRPAR0603">CSRPAR0603</option>
      <option value="CSRPAR0701">CSRPAR0701</option>
      <option value="CSRPAR0702">CSRPAR0702</option>
      <option value="CSRPAR0703">CSRPAR0703</option>
      <option value="CSRPAR0704">CSRPAR0704</option>
      <option value="CSRPAR0801">CSRPAR0801</option>
      <option value="CSRPAR0802">CSRPAR0802</option>
      <option value="CSRPAR1301">CSRPAR1301</option>
      <option value="CSRPAR1501">CSRPAR1501</option>
      <option value="CSRPAR1502">CSRPAR1502</option>
      <option value="CSRSJM1503">CSRSJM1503</option>
      <option value="CSRPAR1504">CSRPAR1504</option>
      <option value="CSR_LV_PNA01">CSR_LV_PNA01</option>
    </select>

    <label>Data *</label>
    <input id="inputData" type="date">

    <label>Descrição</label>
    <textarea id="inputDescricao" rows="3"></textarea>

    <div style="text-align:right">
      <button onclick="fecharModal()" style="background:red;color:#fff;border:none;padding:6px 12px;border-radius:4px">Cancelar</button>
      <button onclick="confirmarExecucao()" style="background:#28a745;color:#fff;border:none;padding:6px 12px;border-radius:4px">
        Confirmar
      </button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

/* ===== TROCAR GUIA ===== */
function trocarGuia(num){
  document.querySelectorAll('.tab').forEach(btn=>{
    btn.classList.remove('active')
  })
  document.querySelectorAll('.tab')[num-1].classList.add('active')

  console.log("Guia ativa:", num)
  // Aqui depois você pode colocar lógica diferente por guia
}

/* ===== UTIL ===== */
const normalize = s => String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase()
const toFloat = v => { const n = parseFloat(String(v).replace(',','.')); return isNaN(n)?null:n }

/* ===== MAPA ===== */
const map = L.map('map').setView([-5.9,-35.29],12)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

const icons = {
  green: L.icon({iconUrl:'https://maps.google.com/mapfiles/ms/icons/green-dot.png',iconSize:[32,32]}),
  red: L.icon({iconUrl:'https://maps.google.com/mapfiles/ms/icons/red-dot.png',iconSize:[32,32]}),
  blue: L.icon({iconUrl:'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',iconSize:[32,32]}),
  user: L.icon({iconUrl:'https://cdn-icons-png.flaticon.com/512/684/684908.png',iconSize:[32,32]})
}

const markers = L.markerClusterGroup()
map.addLayer(markers)

let pontoSelecionadoId = null

fetch('https://mapa-pontos-poda.onrender.com/nds/listar_pendentes')
  .then(r=>r.json())
  .then(data=>{
    data.forEach(row=>{
      const lat = toFloat(row.latitude)
      const lon = toFloat(row.longitude)
      if(!lat||!lon) return

      let icon

      const marker = L.marker([lat,lon],{icon:icons.red})
        .bindPopup(`
          <b>NDS:</b> ${row.numero_nds}<br>
          <b>Barramento:</b> ${row.barramento}<br>
          <b>Serviço:</b> ${row.servico}<br><br>
          <button onclick="abrirModal(${row.id})" style="
            background-color:#28a745;
            color:#fff;
            border:none;
            border-radius:6px;
            padding:8px 14px;
            font-size:14px;
            font-weight:600;
            cursor:pointer;
            width:100%;"
          >Executar</button>
        `)

        markers.addLayer(marker)
    })
  })

function abrirModal(id){
  pontoSelecionadoId=id
  inputEquipe.value=''
  inputData.value=''
  inputDescricao.value=''
  modalExecucao.style.display='block'
}

function fecharModal(){
  modalExecucao.style.display='none'
  pontoSelecionadoId=null
}

function confirmarExecucao(){
  const equipe=inputEquipe.value.trim()
  const data=inputData.value

  if(!equipe || !data){
    alert('Equipe e data são obrigatórios')
    return
  }

  fetch(`https://mapa-pontos-poda.onrender.com/nds/executar/${pontoSelecionadoId}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      equipe,
      data_execucao: data,
      descricao: inputDescricao.value,
      id_ponto: pontoSelecionadoId,
    })
  })
  .then(r=>{
    if(r.status===400) throw new Error('BAD_REQUEST')
    if(!r.ok) throw new Error('ERROR')

    markers.eachLayer(m=>{
      if(m.getPopup()?.getContent().includes(`abrirModal(${pontoSelecionadoId})`)){
        markers.removeLayer(m)
      }
    })

    fecharModal()
  })
  .catch(err=>{
    if(err.message === 'BAD_REQUEST'){
      alert('Ponto já executado!')
    }else{
      alert('Erro ao executar ponto')
    }
  })
}

let userLat,userLon,userMarker
navigator.geolocation?.getCurrentPosition(p=>{
  userLat=p.coords.latitude
  userLon=p.coords.longitude
  userMarker=L.marker([userLat,userLon],{icon:icons.user}).addTo(map)
})

function goToLocation(){
  if(userLat&&userLon){
    map.setView([userLat,userLon],16)
  }
}

</script>
</body>
</html>
