<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Pontos de Poda</title>

  <!-- Leaflet + MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="./css/style.css">

</head>

<body>

<div class="top-tabs">
  <a href="index.html" class="tab active">Podas</a>
  <a href="pages/nds.html" class="tab">NDS</a>
</div>

<div id="map"></div>

<div class="loc-btn" onclick="goToLocation()">📍 Localizar</div>
<div class="coord-btn" onclick="toggleCoordMode()">📌 Pontos Avulsos</div>

<div class="legend">
  <strong>Legenda</strong><br>
  <input type="checkbox" id="chkBT" checked> Poda BT<br>
  <input type="checkbox" id="chkMT" checked> Poda MT<br>
  <input type="checkbox" id="chkTI" checked> Trocar Isolador
</div>

<div id="modalExecucao">
  <div class="box">
    <h3>Executar ponto</h3>

    <label for="inputEquipe">Equipe *</label><br>
    <select id="inputEquipe" style="box-shadow: none; border: 1px solid black; background-color: white;">
      <option value="CSRPAR0601">CSRPAR0601</option>
      <option value="CSRSJM0602">CSRSJM0602</option>
      <option value="CSRPAR0603">CSRPAR0603</option>
      <option value="CSRPAR0701">CSRPAR0701</option>
      <option value="CSRPAR0702">CSRPAR0702</option>
      <option value="CSRPAR0703">CSRPAR0703</option>
      <option value="CSRPAR0704">CSRPAR0704</option>
      <option value="CSRPAR0801">CSRPAR0801</option>
      <option value="CSRPAR0802">CSRPAR0802</option>
      <option value="CSRPAR1301">CSRPAR1301</option>
      <option value="CSRPAR1501">CSRPAR1501</option>
      <option value="CSRPAR1502">CSRPAR1502</option>
      <option value="CSRSJM1503">CSRSJM1503</option>
      <option value="CSRPAR1504">CSRPAR1504</option>
      <option value="CSR_LV_PNA01">CSR_LV_PNA01</option>
    </select>

    <label>Data *</label>
    <input id="inputData" type="date">

    <label>Descrição</label>
    <textarea id="inputDescricao" rows="3"></textarea>

    <div style="text-align:right">
      <button onclick="fecharModal()" style="background:red;color:#fff;border:none;padding:6px 12px;border-radius:4px">Cancelar</button>
      <button onclick="confirmarExecucao()" style="background:#28a745;color:#fff;border:none;padding:6px 12px;border-radius:4px">
        Confirmar
      </button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="scripts/script.js"> </script>

</body>
</html>
